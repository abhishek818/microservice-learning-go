version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: reliable_delivery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  kafka:
    image: redpandadata/redpanda:latest
    container_name: kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

  microservice2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: microservice2
    container_name: microservice2
    environment:
      HTTP_PORT: 8082
      DATABASE_URL: postgres://appuser:apppassword@postgres:5432/reliable_delivery?sslmode=disable
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reliable_network

  microservice1:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: microservice1
    container_name: microservice1
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: reliable-messages
      KAFKA_GROUP_ID: reliable-delivery-group
      MICROSERVICE2_URL: http://microservice2:8082/api/v1/messages
      RETRY_INTERVAL_SECONDS: 10
      HTTP_TIMEOUT_SECONDS: 5
    depends_on:
      kafka:
        condition: service_healthy
      microservice2:
        condition: service_started
    networks:
      - reliable_network

  producer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: producer
    container_name: test_producer
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: reliable-messages
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - reliable_network
    profiles:
      - test

volumes:
  postgres_data:

networks:
  reliable_network:
    driver: bridge
